name: Deploy Web Installer to GitHub Pages

on:
  push:
    branches: [gh-pages-installer]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        name: Checkout installer page

      - uses: actions/checkout@v4
        name: Checkout FluidDial firmware
        with:
          repository: figamore/FluidDial
          ref: feature/esp-now
          path: fluiddial

      - uses: actions/checkout@v4
        name: Checkout FluidNC firmware
        with:
          repository: figamore/FluidNC
          ref: feature/esp-now
          path: fluidnc

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-toolchain
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Build FluidDial firmware
        working-directory: fluiddial
        run: |
          pio run
          pio run -t buildfs
          pio run -t build_merged

      - name: Build FluidNC firmware
        working-directory: fluidnc
        run: |
          mkdir -p ../_site
          pio run -e wifi
          cp .pio/build/wifi/firmware.bin ../_site/fluidnc_esp32_firmware.bin
          pio run -e wifi_s3
          cp .pio/build/wifi_s3/firmware.bin ../_site/fluidnc_esp32s3_firmware.bin

      - name: Prepare Pages site
        run: |
          mkdir -p _site
          cp docs/index.html _site/

          DIAL_SHA=$(cd fluiddial && git rev-parse --short HEAD)
          DIAL_DATE=$(cd fluiddial && git log -1 --format=%cd --date=short)
          NC_SHA=$(cd fluidnc && git rev-parse --short HEAD)
          NC_DATE=$(cd fluidnc && git log -1 --format=%cd --date=short)

          cp fluiddial/.pio/build/m5dial/merged-flash.bin _site/m5dial.bin
          cp fluiddial/.pio/build/cyddial/merged-flash.bin _site/cyddial.bin

          cat > _site/manifest_m5dial.json << EOF
          {
            "name": "FluidDial ESP-NOW (M5Dial)",
            "version": "esp-now@${DIAL_SHA} (${DIAL_DATE})",
            "builds": [
              {
                "chipFamily": "ESP32-S3",
                "parts": [
                  { "path": "m5dial.bin", "offset": 0 }
                ]
              }
            ]
          }
          EOF

          cat > _site/manifest_cyddial.json << EOF
          {
            "name": "FluidDial ESP-NOW (CYD Dial)",
            "version": "esp-now@${DIAL_SHA} (${DIAL_DATE})",
            "builds": [
              {
                "chipFamily": "ESP32",
                "parts": [
                  { "path": "cyddial.bin", "offset": 0 }
                ]
              }
            ]
          }
          EOF


      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
